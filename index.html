<title>Итальянский — карточки слов</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f5f5f5;min-height:100vh;display:flex;align-items:center;justify-content:center}
#overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;padding:16px;z-index:10}
#box{background:#fff;border-radius:16px;width:100%;max-width:420px;padding:24px 20px 20px;position:relative}
#setTitle{font-size:15px;font-weight:700;text-align:center;margin-bottom:14px;color:#222}
#topRow{display:flex;align-items:center;gap:10px;margin-bottom:14px}
#counterEl{font-size:12px;color:#888;white-space:nowrap}
#progWrap{flex:1;height:4px;background:#e0e0e0;border-radius:2px}
#progBar{height:4px;background:#3a7d44;border-radius:2px;transition:width .3s}
#stage{position:relative;height:230px;display:flex;align-items:center;justify-content:center;overflow:hidden}
.card{position:absolute;width:100%;border-radius:14px;border:1px solid #e0e0e0;background:#fff;padding:28px 20px 20px;cursor:pointer;user-select:none;box-shadow:0 2px 12px rgba(0,0,0,.07);touch-action:pan-y}
.word{font-size:26px;font-weight:700;text-align:center;color:#222;margin-bottom:6px}
.trans{font-size:18px;font-weight:600;color:#0F6E56;text-align:center;margin-top:10px;opacity:0;transition:opacity .2s;min-height:28px}
.trans.show{opacity:1}
.readEl{font-size:13px;color:#888;text-align:center;margin-top:6px;opacity:0;transition:opacity .2s;min-height:20px}
.readEl.show{opacity:1}
.tapHint{font-size:12px;color:#aaa;text-align:center;margin-top:14px;transition:opacity .2s}
.tapHint.hide{opacity:0}
.swipeHint{font-size:11px;color:#bbb;text-align:center;margin-top:8px;opacity:0;transition:opacity .3s}
.swipeHint.show{opacity:1}
#doneBox{text-align:center;padding:20px 0}
#doneBox p{color:#666;font-size:14px;margin-bottom:16px}
#restartBtn{background:#3a7d44;color:#fff;border:none;border-radius:10px;padding:10px 28px;font-size:14px;cursor:pointer}
#menuPage{background:#fff;border-radius:16px;width:100%;max-width:440px;padding:28px 20px}
#menuPage h1{font-size:18px;font-weight:700;text-align:center;margin-bottom:6px;color:#222}
#menuPage p{font-size:13px;color:#888;text-align:center;margin-bottom:20px}
.setBtn{display:block;width:100%;background:#f9f9f9;border:1px solid #e5e5e5;border-radius:12px;padding:14px 16px;margin-bottom:10px;font-size:14px;color:#222;cursor:pointer;text-align:left;transition:background .15s}
.setBtn:hover{background:#eef7f1}
.setNum{display:inline-block;width:24px;height:24px;border-radius:50%;background:#3a7d44;color:#fff;font-size:12px;font-weight:700;text-align:center;line-height:24px;margin-right:10px;flex-shrink:0}
</style>
</head>
<body>

<div id="overlay">
  <div id="menuPage" style="display:none"></div>
  <div id="box" style="display:none">
    <div id="setTitle"></div>
    <div id="topRow">
      <span id="counterEl"></span>
      <div id="progWrap"><div id="progBar"></div></div>
    </div>
    <div id="stage"></div>

</div>

var idx=0,flipped=false,dragging=false,startX=0,currentX=0,activeCards=[];
var menuPage=document.getElementById('menuPage');
var box=document.getElementById('box');
var setTitle=document.getElementById('setTitle');
var counterEl=document.getElementById('counterEl');
var progBar=document.getElementById('progBar');
var stage=document.getElementById('stage');

function shuffle(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}

function showMenu(){
  box.style.display='none';
  menuPage.style.display='block';
  menuPage.innerHTML='<h1>🇮🇹 Итальянский</h1><p>Выберите тему для изучения</p>';
  SETS.forEach(function(s,i){
    var btn=document.createElement('button');
    btn.className='setBtn';
    btn.innerHTML='<span class="setNum">'+(i+1)+'</span>'+s.name+' <span style="float:right;color:#aaa;font-size:12px">'+s.cards.length+' карт.</span>';
    btn.onclick=function(){openSet(i);};
    menuPage.appendChild(btn);
  });
}

function openSet(n){
  menuPage.style.display='none';
  box.style.display='block';
  activeCards=shuffle(SETS[n].cards.slice());
  setTitle.textContent=SETS[n].name;
  idx=0;
  renderCard();
}

function renderCard(){
  if(idx>=activeCards.length){
    counterEl.textContent='';
    progBar.style.width='100%';
    stage.innerHTML='<div id="doneBox"><p>Все карточки пройдены! 🎉</p><button id="restartBtn">Повторить</button></div>';
    document.getElementById('restartBtn').onclick=function(){shuffle(activeCards);idx=0;renderCard();};
    return;
  }
  var w=activeCards[idx];
  var pct=Math.round((idx/activeCards.length)*100);
  counterEl.textContent=(idx+1)+' / '+activeCards.length;
  progBar.style.width=pct+'%';
  stage.innerHTML=
    '<div class="card" id="itCard">'+
      '<div class="word">'+w.it+'</div>'+
      '<div class="trans" id="tr">'+w.ru+'</div>'+
      '<div class="readEl" id="rd">🔊 '+w.read+'</div>'+
      '<div class="tapHint" id="th">Нажмите, чтобы увидеть перевод</div>'+
      '<div class="swipeHint" id="sh">← смахните, чтобы продолжить →</div>'+
    '</div>';
  flipped=false;dragging=false;startX=0;currentX=0;
  bindCard();
}

function flip(){
  if(flipped)return;flipped=true;
  document.getElementById('tr').classList.add('show');
  document.getElementById('rd').classList.add('show');
  document.getElementById('th').classList.add('hide');
  setTimeout(function(){var s=document.getElementById('sh');if(s)s.classList.add('show');},200);
}

function nextCard(dir){
  var c=document.getElementById('itCard');
  if(!c)return;
  c.style.transition='transform .22s ease,opacity .22s ease';
  c.style.transform='translateX('+(dir*110)+'%) rotate('+(dir*7)+'deg)';
  c.style.opacity='0';
  setTimeout(function(){idx++;renderCard();},210);
}

function bindCard(){
  var c=document.getElementById('itCard');
  if(!c)return;
  c.addEventListener('click',function(){if(!dragging)flip();dragging=false;});
  c.addEventListener('touchstart',function(e){startX=e.touches[0].clientX;dragging=false;currentX=0;},{passive:true});
  c.addEventListener('touchmove',function(e){
    var dx=e.touches[0].clientX-startX;currentX=dx;
    if(Math.abs(dx)>8&&flipped){dragging=true;c.style.transition='none';c.style.transform='translateX('+dx+'px) rotate('+(dx*0.05)+'deg)';}
  },{passive:true});
  c.addEventListener('touchend',function(){
    if(dragging&&Math.abs(currentX)>40){nextCard(currentX>0?1:-1);}
    else if(dragging){c.style.transition='transform .18s';c.style.transform='none';}
    setTimeout(function(){dragging=false;},40);
  });
  var md=false;
  c.addEventListener('mousedown',function(e){startX=e.clientX;md=true;dragging=false;currentX=0;});
  function onmm(e){if(!md)return;var dx=e.clientX-startX;currentX=dx;var cc=document.getElementById('itCard');if(!cc){document.removeEventListener('mousemove',onmm);return;}if(Math.abs(dx)>8&&flipped){dragging=true;cc.style.transition='none';cc.style.transform='translateX('+dx+'px) rotate('+(dx*0.05)+'deg)';}}
  function onmu(){if(!md)return;md=false;var cc=document.getElementById('itCard');if(cc&&dragging&&Math.abs(currentX)>40&&flipped){nextCard(currentX>0?1:-1);}else if(cc&&dragging){cc.style.transition='transform .18s';cc.style.transform='none';}setTimeout(function(){dragging=false;},40);document.removeEventListener('mousemove',onmm);document.removeEventListener('mouseup',onmu);}
  document.addEventListener('mousemove',onmm);
  document.addEventListener('mouseup',onmu);
}

var params=new URLSearchParams(window.location.search);
var setParam=params.get('set');
if(setParam!==null){
  var n=parseInt(setParam)-1;
  if(n>=0&&n<SETS.length){openSet(n);}
  else{showMenu();}
}else{
  showMenu();
}
</script>
